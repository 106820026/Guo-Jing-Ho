<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <base target="_top">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
<p id="status">載入中...</p>
<p id="url"></p>
<script>
  window.onload = async function() {
    const status = document.getElementById("status");
    const url = document.getElementById("url");

    try {
      status.innerText = "檢查 LIFF SDK...";
      url.innerText = "location.href = " + location.href + ", location.origin: " + location.origin;

      if (typeof liff === "undefined") {
        status.innerText = "LIFF SDK 沒載入";
        return;
      }

      status.innerText = "初始化 LIFF...";

      await liff.init({
        liffId: "2010048012-isyfX80B"
      });

      status.innerText = "LIFF 初始化成功";

      if (!liff.isLoggedIn()) {
        status.innerText = "準備登入...";
        liff.login();
        return;
      }

      status.innerText = "已登入";

    } catch (err) {
      console.error(err);
      status.innerText = "錯誤：" + JSON.stringify(err);
    }
  }
</script>
</body>
</html>
